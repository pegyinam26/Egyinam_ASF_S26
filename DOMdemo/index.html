       const rosterHeader = document.querySelector("h1");
       //add event listener
       // listening for a click event on the h1 element
       rosterHeader.addEventListener("click", ()=>{
           console.log("You clicked h1")
           //set new content
           rosterHeader.textContent = "Avengers Assemble!";
           });

       const form = document.getElementsByTagName("form");
       form[0].addEventListener("submit",(event)=>{
           event.preventDefault();
           let firstName = document.getElementById("first_name")
           let password = document.getElementById("pw")
           /*let isAlive = document.getElementById("radio")*/
           let isAlive = document.querySelector('input[name="isAlive"]:checked')
           console.log("Submitted");
           console.log("Value from first name input: ",firstName.value, password.value,isAlive.value);
           //building an object from these values obtained
           let newData={
               fname: firstName.value,
               password: password.value,
               isAlive: isAlive.value
           }


            //turning object into a string to parsed to the server
           console.log(JSON.stringify(newData))
